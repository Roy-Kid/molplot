name: "Release: Core (npm)"

on:
  push:
    tags: ["v*"]
  # Manual re-publish after a workflow fix / transient infra failure, without
  # recreating the release tag.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release-core
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships npm 11.5+, the minimum for OIDC Trusted Publishing's
      # registry-side handshake (Node 22's bundled npm 10.9 cannot complete it).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install

      - name: Presets in sync
        run: npm run check:presets

      - name: Build core
        run: npm run build:core

      - name: Publish to npm (Trusted Publisher, OIDC)
        run: npm publish -w core --provenance --access public
