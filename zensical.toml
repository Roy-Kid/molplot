[project]
site_name = "MolPlot"
site_description = "Unified scientific charting: Vega-Lite on the web, scienceplots on paper, one preset."
site_url = "https://molplot.molcrafts.org/"
repo_url = "https://github.com/MolCrafts/molplot"
repo_name = "MolCrafts/molplot"
copyright = "Copyright &copy; 2026 MolCrafts"
docs_dir = "docs"
site_dir = "site"

# Load the self-registering `<molplot-chart>` Web Component (the `elements`
# bundle of @molcrafts/molplot). It registers the custom element cheaply; the
# vega runtime is a lazy chunk that downloads only when a chart mounts. This is
# what makes the `<molplot-chart>` element and the ```molplot fence render live.
extra_javascript = [
  { path = "https://cdn.jsdelivr.net/npm/@molcrafts/molplot@latest/dist/elements.js", type = "module" },
]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started/index.md" },
  { "Unified Preset" = [
    "getting-started/preset.md",
    { "Web (Vega-Lite)" = "getting-started/web.md" },
    { "Python (scienceplots)" = "getting-started/python.md" },
    { "Charts in Markdown" = "getting-started/markdown.md" },
  ] },
  { "API Reference" = "api/index.md" },
]

# Markdown extensions. Declaring this section REPLACES Zensical's built-in
# default set (it is not merged), so the full default set is reproduced
# verbatim. The ```molplot fence is owned by molcrafts-zensical-theme — not
# this package.
[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx]
betterem = {}
caret = {}
details = {}
inlinehilite = {}
keys = {}
magiclink = {}
mark = {}
smartsymbols = {}
tilde = {}
arithmatex = { generic = true }
emoji = { emoji_generator = "zensical.extensions.emoji.to_svg", emoji_index = "zensical.extensions.emoji.twemoji" }
highlight = { anchor_linenums = true, line_spans = "__span", pygments_lang_class = true }
tabbed = { alternate_style = true, combine_header_slug = true }
tasklist = { custom_checkbox = true }

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid" },
  { name = "molplot", class = "molplot", format = "molcrafts_zensical_theme.formatters.molplot_fence", validator = "molcrafts_zensical_theme.formatters.molplot_validator" },
]

# Shared MolCrafts theme (github.com/MolCrafts/molcrafts-zensical-theme). Provides
# the brand palette, light/dark schemes, navigation features, and the home-page
# hero/manual-home component system used by docs/index.md. The package must be
# installed to build (see the `doc` dependency group in python/pyproject.toml).
[project.theme]
name = "molcrafts"
language = "en"

# Selects the molplot accent (indigo) for links, hovers, and hero eyebrows.
[project.extra.molcrafts]
product = "molplot"
accent = "#4f46e5"                        # primary (主) — molplot signature colour
accent_soft = "rgba(79, 70, 229, 0.14)"   # secondary (副) — soft fill behind it

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/MolCrafts/molplot"
